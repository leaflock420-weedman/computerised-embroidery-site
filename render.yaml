services:
  - type: web
    name: computerised-embroidery
    runtime: node
    plan: free
    buildCommand: npm install && pip install -r requirements.txt
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PYTHON_VERSION
        value: "3.12"
      - key: ADMIN_KEY
        value: ce-production-2026