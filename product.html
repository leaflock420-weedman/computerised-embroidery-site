<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | Computerised Embroidery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="shop.css">
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">
        <img src="assets/brand/logo-header.png" alt="Computerised Embroidery" class="logo__img" width="114" height="80" decoding="async">
      </a>
      <nav class="nav" id="nav">
        <a href="shop.html">Shop</a>
        <a href="index.html#services">Services</a>
        <a href="index.html#contact">Contact</a>
      </nav>
      <div class="header__actions">
        <a href="checkout.html" class="cart-link">
          Order <span class="cart-badge" data-cart-count hidden>0</span>
        </a>
        <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main class="product-page">
    <div class="container">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="shop.html">Shop</a> / <span id="breadcrumbName">Product</span>
      </nav>
      <div class="product-detail" id="productDetail"></div>
    </div>
  </main>

  <div class="toast" id="toast" hidden></div>

  <footer class="footer">
    <div class="container footer__inner">
      <p class="footer__copy">&copy; <span id="year"></span> Computerised Embroidery</p>
    </div>
  </footer>

  <script type="module" src="js/product.js"></script>
</body>
</html>
